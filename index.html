<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <meta name="x5-orientation" content="landscape">
    <title>無人機抗風特訓</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<link rel="preload" as="image" href="./assets/grasslight-big.webp">
        <style>
        :root {
            --hud-bg: rgba(11, 18, 32, 0.72);
            --hud-border: rgba(255, 255, 255, 0.18);
            --hud-glow: rgba(42, 197, 255, 0.34);
            --accent: #26c6ff;
            --accent-strong: #00a8ff;
            --warning: #ffcc45;
            --danger: #ff4d6d;
            --panel-text: #eef6ff;
            --muted: #b8c7d9;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: #07101f;
            color: var(--panel-text);
            font-family: "Segoe UI", "Microsoft JhengHei", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 48px 48px, 48px 48px;
            opacity: 0.3;
        }

        #controls {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            width: min(1180px, calc(100vw - 24px));
            padding: 12px 16px;
            justify-content: center;
            align-items: center;
            z-index: 30;
            background: var(--hud-bg);
            border: 1px solid var(--hud-border);
            border-radius: 8px;
            box-shadow: 0 18px 44px rgba(0,0,0,0.34), 0 0 28px var(--hud-glow);
            backdrop-filter: blur(14px) saturate(130%);
        }

        #controls label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            color: var(--muted);
            font-weight: 700;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(255,255,255,255);
        }

        #info-panel {
            position: fixed;
            left: 50%;
            bottom: max(14px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            width: min(1120px, calc(100vw - 230px));
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 25;
            background: rgba(8, 16, 29, 0.68);
            border: 1px solid var(--hud-border);
            border-radius: 8px;
            box-shadow: 0 14px 36px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.08);
            backdrop-filter: blur(12px) saturate(120%);
            font-size: 13px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        #info-panel span {
            display: inline-flex;
            align-items: center;
            margin: 2px 3px;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        #windStatusText {
            border: 1px solid rgba(255,118,117,0.35);
            box-shadow: 0 0 18px rgba(255,77,109,0.18);
        }

        #gameArea {
            position: relative;
            width: 100%;
            height: 100%;
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background: #4ab4f5; 
            box-shadow: inset 0 0 90px rgba(0,0,0,0.28);
        }

        canvas {
            position: relative;
            z-index: 2;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #crashAlert {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 34px;
            font-weight: 900;
            display: none;
            z-index: 100;
            padding: 12px 22px;
            border: 1px solid rgba(255,255,255,0.32);
            border-radius: 8px;
            background: rgba(123, 0, 24, 0.62);
            text-shadow: 0 0 10px #ff003c, 0 2px 8px #000;
            box-shadow: 0 0 0 9999px rgba(255, 0, 56, 0.16), 0 0 36px rgba(255,0,56,0.72);
            pointer-events: none;
            animation: crashPulse 0.68s ease-in-out infinite alternate;
        }

        @keyframes crashPulse {
            from { transform: translate(-50%, -50%) scale(0.98); filter: brightness(1); }
            to { transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.35); }
        }

        #joystick-zone,
        #joystick-left-zone {
            position: absolute;
            bottom: 20px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            touch-action: none;
            cursor: crosshair;
            z-index: 28;
            background:
                linear-gradient(rgba(38,198,255,0.26), rgba(38,198,255,0.26)) center / 2px 72% no-repeat,
                linear-gradient(90deg, rgba(38,198,255,0.26), rgba(38,198,255,0.26)) center / 72% 2px no-repeat,
                radial-gradient(circle, transparent 35%, rgba(38,198,255,0.18) 36%, transparent 38%),
                radial-gradient(circle, rgba(3,10,18,0.42), rgba(3,10,18,0.78));
            border: 2px solid rgba(38,198,255,0.48);
            box-shadow: inset 0 0 24px rgba(38,198,255,0.22), 0 12px 28px rgba(0,0,0,0.46), 0 0 24px rgba(38,198,255,0.2);
            backdrop-filter: blur(7px);
        }

        #joystick-zone { right: 20px; }
        #joystick-left-zone { left: 20px; }

        #joystick-zone::before,
        #joystick-left-zone::before {
            content: "";
            position: absolute;
            inset: 12px;
            border-radius: 50%;
            border: 1px dashed rgba(255,255,255,0.28);
            pointer-events: none;
        }

        #joystick-stick,
        #joystick-left-stick {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            background: radial-gradient(circle at 32% 30%, #ffffff 0%, #d7f5ff 28%, #71bed8 58%, #21384c 100%);
            border: 1px solid rgba(255,255,255,0.82);
            box-shadow: 0 8px 18px rgba(0,0,0,0.58), inset -4px -5px 10px rgba(0,0,0,0.32), 0 0 18px rgba(38,198,255,0.46);
            transition: transform 0.05s ease-out;
        }

        button, select, input {
            padding: 6px 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.18);
            font-family: inherit;
        }

        select {
            min-height: 34px;
            color: #f7fbff;
            background: rgba(11, 18, 32, 0.85);
            outline: none;
        }
        
        option {
            background-color: #0b1220; 
            color: #ffffff;
        }

        button {
            min-height: 34px;
            background: linear-gradient(180deg, #26c6ff, #0578d8);
            color: white;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 7px 18px rgba(0,168,255,0.26), inset 0 1px 0 rgba(255,255,255,0.22);
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
            box-shadow: 0 10px 24px rgba(0,168,255,0.36), 0 0 18px rgba(38,198,255,0.34);
        }

        #switchCamBtn {
            background: linear-gradient(180deg, #ffe08a, #f0a51a);
            color: #172033;
            box-shadow: 0 7px 18px rgba(255,204,69,0.25), inset 0 1px 0 rgba(255,255,255,0.32);
        }

        #switchCamBtn:hover {
            box-shadow: 0 10px 24px rgba(255,204,69,0.35), 0 0 18px rgba(255,204,69,0.28);
        }

        input[type="range"] {
            width: 150px;
            padding: 0;
            border: 0;
            cursor: pointer;
            background: transparent;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(38,198,255,0.92), rgba(255,204,69,0.88));
            box-shadow: inset 0 0 6px rgba(0,0,0,0.45);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            margin-top: -6px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }

        input[type="range"]::-moz-range-track {
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(38,198,255,0.92), rgba(255,204,69,0.88));
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            user-select: none;
            color: #ff8ba0;
            font-weight: 800;
        }

        .checkbox-label.joystick-toggle { color: #6ef0a6; }

        input[type="checkbox"] {
            cursor: pointer;
            width: 17px;
            height: 17px;
            accent-color: var(--accent-strong);
        }

        @media (max-width: 900px), (max-height: 560px) {
            #info-panel { display: none !important; }
            #controls {
                top: max(8px, env(safe-area-inset-top));
                width: calc(100vw - 16px);
                padding: 8px 10px;
                gap: 7px;
                justify-content: center;
            }
            #controls label { font-size: 12px; min-height: 30px; }
            button, select, input { font-size: 12px; }
            input[type="range"] { width: 112px; }
            #joystick-zone { width: 115px; height: 115px; bottom: 15px; right: 20px; }
            #joystick-left-zone { width: 115px; height: 115px; bottom: 15px; left: 20px; }
            #crashAlert { font-size: 24px; top: 16%; }
        }
    </style>
</head>
<body>

    <div id="controls">
        <!-- 若您先前沒複製到這一段，現在請一併複製進去 -->
        <label>搖桿模式:
            <select id="gamepadMode">
                <option value="auto" selected>自動偵測</option>
                <option value="xinput">標準配置 (XInput / Xbox)</option>
                <option value="direct">原生配置 (DirectInput / PS)</option>
            </select>
        </label>
        <label>風速 <input type="range" id="windSpeed" min="0" max="0.08" step="0.01" value="0"></label>
        <label>風向:
            <select id="windDir">
                <option value="NONE" selected>無風</option>
                <option value="RANDOM">隨機陣風</option>
                <option value="E">東風</option>
                <option value="W">西風</option>
                <option value="S">南風</option>
                <option value="N">北風</option>
                <option value="NE">東北風</option>
                <option value="NW">西北風</option>
                <option value="SE">東南風</option>
                <option value="SW">西南風</option>
            </select>
        </label>
        <label class="checkbox-label"><input type="checkbox" id="showArrowBtn" > 顯示風向箭頭</label>
        <label class="checkbox-label joystick-toggle"><input type="checkbox" id="showJoystickBtn" checked> 顯示雙搖桿</label>
        <button id="switchCamBtn">切換視角</button>
        <button id="resetBtn">重設</button>
    </div>

    <div id="info-panel">
        <div class="info-row">
            <div>
                <span style="color: #ff4757; font-weight: bold;">H 起降點</span> | 
                <span style="color: #ffffff; font-weight: bold;">黑色航線</span> | 
                <span style="color: #ff9d4d; font-weight: bold;">橘色立柱</span> | 
                <span style="color: #47F0FF; font-weight: bold;">藍色立柱</span> |
                <span style="color: #f1c40f; font-weight: bold;">黃色立柱</span>
            </div>
            <div id="windStatusText" style="color: #ff7675; font-weight: bold; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px;"></div>
        </div>
        <div class="info-row" style="color: #dcdde1; font-size: 13px;">
            <div><strong>控制:</strong> 左搖桿控制升降與轉向 (油門/偏航)，右搖桿控制前後左右平移 (俯仰/滾轉)</div>
            <div><strong>目標:</strong> 若實體右搖桿無反應，請於上方切換「搖桿模式」。</div>
        </div>
    </div>

    <div id="gameArea">
        <div id="crashAlert">碰撞警告</div>
        <canvas id="simCanvas"></canvas>
        <div id="joystick-left-zone" style="display: block;">
            <div id="joystick-left-stick"></div>
        </div>
        <div id="joystick-zone" style="display: block;">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script>
        // --- 1. UI 與控制邏輯 ---
        const stick = document.getElementById('joystick-stick');
        const zone = document.getElementById('joystick-zone');
        const leftStick = document.getElementById('joystick-left-stick');
        const leftZone = document.getElementById('joystick-left-zone');
        const windStatusText = document.getElementById('windStatusText');
        const showJoystickBtn = document.getElementById('showJoystickBtn');
        const switchCamBtn = document.getElementById('switchCamBtn');
        
        let joyDx = 0; let joyDy = 0; let isTouching = false; 
        let joyLeftDx = 0; let joyLeftDy = 0; let isLeftTouching = false;
        let keys = {};
        let currentWind = { x: 0, z: 0 }; 
        let targetWind = { x: 0, z: 0 }; 
        let windTimer = null;
        let windArrow3D;
        
        let currentCamView = 1;

        const colliders = [];

        showJoystickBtn.addEventListener('change', (e) => {
            zone.style.display = e.target.checked ? 'block' : 'none';
            leftZone.style.display = e.target.checked ? 'block' : 'none';
        });

        switchCamBtn.addEventListener('click', () => {
            currentCamView = (currentCamView === 1) ? 2 : 1;
        });

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function updateStickTarget(clientX, clientY) {
            const rect = zone.getBoundingClientRect();
            if(rect.width === 0) return; 
            const currentMaxStickRadius = rect.width / 2 - stick.offsetWidth / 2;
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            let dx = clientX - centerX; let dy = clientY - centerY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > currentMaxStickRadius) { dx = (dx / distance) * currentMaxStickRadius; dy = (dy / distance) * currentMaxStickRadius; }
            joyDx = (dx / currentMaxStickRadius) * 60; joyDy = (dy / currentMaxStickRadius) * 60;
            stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }

        function updateLeftStickTarget(clientX, clientY) {
            const rect = leftZone.getBoundingClientRect();
            if(rect.width === 0) return; 
            const currentMaxStickRadius = rect.width / 2 - leftStick.offsetWidth / 2;
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            let dx = clientX - centerX; let dy = clientY - centerY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > currentMaxStickRadius) { dx = (dx / distance) * currentMaxStickRadius; dy = (dy / distance) * currentMaxStickRadius; }
            joyLeftDx = (dx / currentMaxStickRadius) * 60; joyLeftDy = (dy / currentMaxStickRadius) * 60;
            leftStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }

        zone.addEventListener('mousemove', (e) => { isTouching = true; updateStickTarget(e.clientX, e.clientY); });
        zone.addEventListener('mouseleave', () => { isTouching = false; joyDx = 0; joyDy = 0; stick.style.transform = `translate(-50%, -50%)`; });
        zone.addEventListener('touchstart', (e) => { e.preventDefault(); isTouching = true; updateStickTarget(e.targetTouches[0].clientX, e.targetTouches[0].clientY); }, { passive: false });
        zone.addEventListener('touchmove', (e) => { e.preventDefault(); isTouching = true; updateStickTarget(e.targetTouches[0].clientX, e.targetTouches[0].clientY); }, { passive: false });
        zone.addEventListener('touchend', (e) => { e.preventDefault(); isTouching = false; joyDx = 0; joyDy = 0; stick.style.transform = `translate(-50%, -50%)`; }, { passive: false });

        leftZone.addEventListener('mousemove', (e) => { isLeftTouching = true; updateLeftStickTarget(e.clientX, e.clientY); });
        leftZone.addEventListener('mouseleave', () => { isLeftTouching = false; joyLeftDx = 0; joyLeftDy = 0; leftStick.style.transform = `translate(-50%, -50%)`; });
        leftZone.addEventListener('touchstart', (e) => { e.preventDefault(); isLeftTouching = true; updateLeftStickTarget(e.targetTouches[0].clientX, e.targetTouches[0].clientY); }, { passive: false });
        leftZone.addEventListener('touchmove', (e) => { e.preventDefault(); isLeftTouching = true; updateLeftStickTarget(e.targetTouches[0].clientX, e.targetTouches[0].clientY); }, { passive: false });
        leftZone.addEventListener('touchend', (e) => { e.preventDefault(); isLeftTouching = false; joyLeftDx = 0; joyLeftDy = 0; leftStick.style.transform = `translate(-50%, -50%)`; }, { passive: false });

        function updateWind() {
            let speedText = document.getElementById('windSpeed').value;
            let speed = speedText ? parseFloat(speedText) : 0; // 防呆確保不是 NaN
            let dirSelect = document.getElementById('windDir');
            let dir = dirSelect ? dirSelect.value : 'NONE';

            if (dir === 'NONE') {
                windStatusText.innerText = `目前無風：環境穩定`;
                targetWind.x = 0; targetWind.z = 0;
            } else if (dir === 'RANDOM') {
                windStatusText.innerText = `隨機陣風模式：風向與強度會持續變化`;
            } else {
                windStatusText.innerText = `固定風向：風速 ${(speed * 200).toFixed(0)} 級`;
                let wx = 0, wz = 0;
                if (dir.includes('E')) wx = 1; if (dir.includes('W')) wx = -1;
                if (dir.includes('S')) wz = 1; if (dir.includes('N')) wz = -1;
                if (wx !== 0 && wz !== 0) { wx *= 0.8; wz *= 0.8; }
                targetWind.x = wx * speed; targetWind.z = wz * speed;
            }
        }
        function triggerRandomWind() {
            let dirSelect = document.getElementById('windDir');
            if (!dirSelect || dirSelect.value !== 'RANDOM') return;
            const baseSpeed = parseFloat(document.getElementById('windSpeed').value) || 0;
            const dirs = ['E', 'W', 'S', 'N', 'NE', 'NW', 'SE', 'SW'];
            let nextDuration = 1500 + Math.random() * 3500; 
            let stateRoll = Math.random();
            if (stateRoll < 0.3) { targetWind.x = 0; targetWind.z = 0; } else {
                let dirStr = dirs[Math.floor(Math.random() * dirs.length)];
                let wx = 0, wz = 0;
                if (dirStr.includes('E')) wx = 1; if (dirStr.includes('W')) wx = -1;
                if (dirStr.includes('S')) wz = 1; if (dirStr.includes('N')) wz = -1;
                if (wx !== 0 && wz !== 0) { wx *= 0.8; wz *= 0.8; }
                let multiplier = (stateRoll < 0.7) ? (0.2 + Math.random() * 0.4) : (0.8 + Math.random() * 0.8);
                targetWind.x = wx * baseSpeed * multiplier; targetWind.z = wz * baseSpeed * multiplier;
            }
            clearTimeout(windTimer); windTimer = setTimeout(triggerRandomWind, nextDuration);
        }

        let windSpeedEl = document.getElementById('windSpeed');
        let windDirEl = document.getElementById('windDir');
        if(windSpeedEl) windSpeedEl.addEventListener('input', updateWind);
        if(windDirEl) windDirEl.addEventListener('change', () => {
            clearTimeout(windTimer);
            if (windDirEl.value === 'RANDOM') { updateWind(); triggerRandomWind(); } else { updateWind(); }
        });
        
        let resetBtn = document.getElementById('resetBtn');
        if(resetBtn) {
            resetBtn.addEventListener('click', () => {
                droneLogic.x = 0; droneLogic.y = 3; droneLogic.z = 0; droneLogic.vx = 0; droneLogic.vz = 0; droneLogic.yaw = 0;
                updateWind();
            });
        }

        // --- 2. Three.js 3D 場景建置 ---
        const canvas = document.getElementById('simCanvas');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setClearColor(0x000000, 0);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(20, 80, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -50; dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50; dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.near = 0.5; dirLight.shadow.camera.far = 200;
        dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const textureLoader = new THREE.TextureLoader();

        function createCanvasTexture(width, height, draw) {
            const skyCanvas = document.createElement('canvas');
            skyCanvas.width = width;
            skyCanvas.height = height;
            const ctx = skyCanvas.getContext('2d');
            draw(ctx, width, height);
            const texture = new THREE.CanvasTexture(skyCanvas);
            texture.needsUpdate = true;
            return texture;
        }

	    scene.fog = new THREE.Fog(0x87A8C2, 30, 120);

        const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({
            map: createCanvasTexture(256, 256, (ctx, width, height) => {
                const glow = ctx.createRadialGradient(width * 0.5, height * 0.5, 2, width * 0.5, height * 0.5, width * 0.5);
                glow.addColorStop(0, 'rgba(255,255,255,0.95)');
                glow.addColorStop(0.18, 'rgba(255,236,174,0.75)');
                glow.addColorStop(0.42, 'rgba(255,216,116,0.24)');

            if (gp) {
                const deadzone = 0.1; 
                
                // === 加入防呆機制：確保讀取軸不會出錯 ===
                let leftX = 0; let leftY = 0;
                if(gp.axes.length >= 2) {
                    leftX = Math.abs(gp.axes[0]) > deadzone ? gp.axes[0] : 0; 
                    leftY = Math.abs(gp.axes[1]) > deadzone ? gp.axes[1] : 0;
                }

                const mode = modeSelect ? modeSelect.value : 'auto';
                
                let useDirectInput = false;

                if (mode === 'direct') {
                    useDirectInput = true;

                    rightY = Math.abs(gp.axes[2]) > deadzone ? gp.axes[2] : 0; // PS 原生: Z軸

                    rightY = Math.abs(gp.axes[3]) > deadzone ? gp.axes[3] : 0; // 標準 Xbox: Y軸
                }

                            collisionHit = true; break;
                        }
                    }
                }
            }

            if (collisionHit) {
                droneLogic.vx *= -0.8;
                droneLogic.vz *= -0.8;
                
                let crashAlertEl = document.getElementById('crashAlert');
                if(crashAlertEl) crashAlertEl.style.display = 'block'; // 防呆
                if(window.crashTimer) clearTimeout(window.crashTimer);
                window.crashTimer = setTimeout(() => { if(crashAlertEl) crashAlertEl.style.display = 'none'; }, 600);
            } else {
                droneLogic.x = nextX;
                droneLogic.z = nextZ;
            }
            
            const mapBoundX = 34.5;
            const mapBoundZ = 17.0;
            if(droneLogic.x > mapBoundX) { droneLogic.x = mapBoundX; droneLogic.vx = 0; }
            if(droneLogic.x < -mapBoundX) { droneLogic.x = -mapBoundX; droneLogic.vx = 0; }
            if(droneLogic.z > mapBoundZ) { droneLogic.z = mapBoundZ; droneLogic.vz = 0; }
            if(droneLogic.z < -mapBoundZ) { droneLogic.z = -mapBoundZ; droneLogic.vz = 0; }

            droneGroup.position.x = droneLogic.x; droneGroup.position.y = droneLogic.y; droneGroup.position.z = droneLogic.z;

            let showArrowBtn = document.getElementById('showArrowBtn');
            let showArrow = showArrowBtn ? showArrowBtn.checked : false; // 防呆
            if (windArrow3D) {
                let windSpeedMag = Math.sqrt(currentWind.x**2 + currentWind.z**2);
                if (windSpeedMag > 0.005 && showArrow) { 
                    windArrow3D.visible = true;
                    let wVector = new THREE.Vector3(currentWind.x, 0, currentWind.z).normalize();
                    let arrowLen = 3 + windSpeedMag * 30; 
                    windArrow3D.setDirection(wVector); windArrow3D.setLength(arrowLen, 0.5, 0.4);
                    let offsetDistance = 1.2; 
                    let tipPos = droneGroup.position.clone().sub(wVector.multiplyScalar(offsetDistance));
                    tipPos.y = droneGroup.position.y; 
                    let originPos = tipPos.clone().sub(wVector.multiplyScalar(arrowLen));
                    windArrow3D.position.copy(originPos);
                } else { windArrow3D.visible = false; }
            }

            if (currentCamView === 1) {
                camera.position.set(0, dynamicCameraY / 1, 8);
                camera.lookAt(0, -35, -25);
            } else {
                camera.position.set(0, dynamicCameraY / 3, 20);
                camera.lookAt(0, -40, -200);
            }

            const skyTime = performance.now() * 0.001;
            clouds.forEach((cloud, index) => {
                cloud.position.x = cloud.userData.baseX + Math.sin(skyTime * cloud.userData.drift + index) * 5;
                cloud.material.opacity = 0.44 + Math.sin(skyTime * 0.12 + index) * 0.06;
            });

            renderer.render(scene, camera);
        }

        let windDirElForInit = document.getElementById('windDir');
        if (windDirElForInit && windDirElForInit.value === 'RANDOM') { triggerRandomWind(); }
        
        updateDynamicHeight(); updateWind(); animate();
    </script>
</body>
</html>
