<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <meta name="x5-orientation" content="landscape">
    <title>3D 無人機 CAA 術科標準抗風模擬器 (雙搖桿手機版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #1e272e; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* 控制列 */
        #controls { display: flex; flex-wrap: wrap; gap: 15px; padding: 12px 15px; background: #2f3640; width: 100%; justify-content: center; box-sizing: border-box; align-items: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        /* 獨立的資訊面板 */
        #info-panel { width: 100%; max-width: 1200px; background: #353b48; padding: 10px 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 8px; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 5; }
        .info-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        /* 3D 遊戲區域 */
        #gameArea { position: relative; width: 100%; height: 100%; flex-grow: 1; box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden; display: flex; justify-content: center; background: #87CEEB; }
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }

        /* 碰撞警告 */
        #crashAlert { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); color: #ff4757; font-size: 32px; font-weight: bold; display: none; z-index: 100; text-shadow: 0px 0px 15px #000, 0px 0px 5px #fff; pointer-events: none; }

        /* 右虛擬搖桿設計 */
        #joystick-zone { position: absolute; bottom: 20px; right: 20px; width: 140px; height: 140px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; touch-action: none; cursor: crosshair; z-index: 15; }
        #joystick-stick { width: 40px; height: 40px; background: rgba(236, 240, 241, 0.9); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: transform 0.05s ease-out; }
        
        /* 左虛擬搖桿設計 */
        #joystick-left-zone { position: absolute; bottom: 20px; left: 20px; width: 140px; height: 140px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; touch-action: none; cursor: crosshair; z-index: 15; }
        #joystick-left-stick { width: 40px; height: 40px; background: rgba(236, 240, 241, 0.9); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: transform 0.05s ease-out; }

        button, select, input { padding: 5px 10px; font-size: 14px; border-radius: 4px; border: none; }
        button { background-color: #00a8ff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0097e6; }
        #switchCamBtn { background-color: #fbc531; color: #2f3640; }
        #switchCamBtn:hover { background-color: #e1b12c; }
        
        .checkbox-label { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; color: #ff4757; font-weight: bold; }
        .checkbox-label.joystick-toggle { color: #2ecc71; }
        input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }

        /* 手機版小螢幕優化 (移除說明欄、放大遊戲佔比) */
        @media (max-width: 850px), (max-height: 500px) {
            #info-panel { display: none !important; }
            #controls { padding: 6px 10px; gap: 8px; }
            #joystick-zone { width: 115px; height: 115px; bottom: 15px; right: 20px; }
            #joystick-left-zone { width: 115px; height: 115px; bottom: 15px; left: 20px; }
            #crashAlert { font-size: 24px; top: 15%; }
        }
    </style>
</head>
<body>

    <div id="controls">
        <label>基礎風速限制: <input type="range" id="windSpeed" min="0" max="0.15" step="0.01" value="0.05"></label>
        <label>風向模式:
            <select id="windDir">
                <option value="NONE" selected>無風模式 (預設)</option>
                <option value="RANDOM">★ 隨機陣風 (強/弱/無風交替)</option>
                <option value="E">西風 (向右吹)</option>
                <option value="W">東風 (向左吹)</option>
                <option value="S">北風 (向下吹)</option>
                <option value="N">南風 (向上吹)</option>
                <option value="NE">西南風</option>
                <option value="NW">東南風</option>
                <option value="SE">西北風</option>
                <option value="SW">東北風</option>
            </select>
        </label>
        <label class="checkbox-label"><input type="checkbox" id="showArrowBtn" > 顯示風向標示</label>
        <label class="checkbox-label joystick-toggle"><input type="checkbox" id="showJoystickBtn" checked> 顯示虛擬搖桿</label>
        <button id="switchCamBtn">🎥 切換視角</button>
        <button id="resetBtn">重置返回 H 起降點</button>
    </div>

    <div id="info-panel">
        <div class="info-row">
            <div>
                <span style="color: #ff4757; font-weight: bold;">● H 起降點 (紅圈)</span> | 
                <span style="color: #ffffff; font-weight: bold;">■ 嵌套航線矩形 (白線)</span> | 
                <span style="color: #ff5e13; font-weight: bold;">▲ 考場交通錐 (三角錐)</span> | 
                <span style="color: #47F0FF; font-weight: bold;">★ 藍色箭頭：風向</span> |
                <span style="color: #f1c40f; font-weight: bold;">⭕ 球門：小心碰撞！</span>
            </div>
            <div id="windStatusText" style="color: #ff7675; font-weight: bold; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 4px;"></div>
        </div>
        <div class="info-row" style="color: #dcdde1; font-size: 13px;">
            <div><strong>操作：</strong> [左搖桿] 升降與旋轉(Throttle/Yaw) | [右搖桿] 前後左右平移(Pitch & Roll)</div>
            <div><strong>提示：</strong> 無人機具備實體物理碰撞，觸碰邊界、三角錐與球門圈將會被彈開！</div>
        </div>
    </div>

    <div id="gameArea">
        <div id="crashAlert">⚠️ 發生碰撞！</div>
        <canvas id="simCanvas"></canvas>
        <div id="joystick-left-zone" style="display: block;">
            <div id="joystick-left-stick"></div>
        </div>
        <div id="joystick-zone" style="display: block;">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <script>
        // --- 1. UI 與控制邏輯 ---
        const stick = document.getElementById('joystick-stick');
        const zone = document.getElementById('joystick-zone');
        const leftStick = document.getElementById('joystick-left-stick');
        const leftZone = document.getElementById('joystick-left-zone');
        const windStatusText = document.getElementById('windStatusText');
        const showJoystickBtn = document.getElementById('showJoystickBtn');
        const switchCamBtn = document.getElementById('switchCamBtn');
        
        let joyDx = 0; let joyDy = 0; let isTouching = false; 
        let joyLeftDx = 0; let joyLeftDy = 0; let isLeftTouching = false;
        let keys = {};
        let currentWind = { x: 0, z: 0 }; 
        let targetWind = { x: 0, z: 0 }; 
        let windTimer = null;
        let windArrow3D;
        
        let currentCamView = 1; // 記錄目前的視角狀態

        // 用來存放所有具備物理碰撞的物體
        const colliders = [];

        showJoystickBtn.addEventListener('change', (e) => {
            zone.style.display = e.target.checked ? 'block' : 'none';
            leftZone.style.display = e.target.checked ? 'block' : 'none';
        });

        // 綁定視角切換按鈕
        switchCamBtn.addEventListener('click', () => {
            currentCamView = (currentCamView === 1) ? 2 : 1;
        });

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // 虛擬搖桿座標更新
        function updateStickTarget(clientX, clientY) {
            const rect = zone.getBoundingClientRect();
            if(rect.width === 0) return; 
            const currentMaxStickRadius = rect.width / 2 - stick.offsetWidth / 2;
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            let dx = clientX - centerX; let dy = clientY - centerY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > currentMaxStickRadius) { dx = (dx / distance) * currentMaxStickRadius; dy = (dy / distance) * currentMaxStickRadius; }
            joyDx = (dx / currentMaxStickRadius) * 60; joyDy = (dy / currentMaxStickRadius) * 60;
            stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }

        function updateLeftStickTarget(clientX, clientY) {
            const rect = leftZone.getBoundingClientRect();
            if(rect.width === 0) return; 
            const currentMaxStickRadius = rect.width / 2 - leftStick.offsetWidth / 2;
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            let dx = clientX - centerX; let dy = clientY - centerY;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > currentMaxStickRadius) { dx = (dx / distance) * currentMaxStickRadius; dy = (dy / distance) * currentMaxStickRadius; }
            joyLeftDx = (dx / currentMaxStickRadius) * 60; joyLeftDy = (dy / currentMaxStickRadius) * 60;
            leftStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }

        zone.addEventListener('mousemove', (e) => { isTouching = true; updateStickTarget(e.clientX, e.clientY); });
        zone.addEventListener('mouseleave', () => { isTouching = false; joyDx = 0; joyDy = 0; stick.style.transform = `translate(-50%, -50%)`; });
        zone.addEventListener('touchstart', (e) => { e.preventDefault(); isTouching = true; updateStickTarget(e.targetTouches[0].clientX, e.targetTouches[0].clientY); }, { passive: false });
        zone.addEventListener('touchmove', (e) => { e.preventDefault(); isTouching = true; updateStickTarget(e.targetTouches[0].clientX, e.targetTouches[0].clientY); }, { passive: false });
        zone.addEventListener('touchend', (e) => { e.preventDefault(); isTouching = false; joyDx = 0; joyDy = 0; stick.style.transform = `translate(-50%, -50%)`; }, { passive: false });

        leftZone.addEventListener('mousemove', (e) => { isLeftTouching = true; updateLeftStickTarget(e.clientX, e.clientY); });
        leftZone.addEventListener('mouseleave', () => { isLeftTouching = false; joyLeftDx = 0; joyLeftDy = 0; leftStick.style.transform = `translate(-50%, -50%)`; });
        leftZone.addEventListener('touchstart', (e) => { e.preventDefault(); isLeftTouching = true; updateLeftStickTarget(e.targetTouches[0].clientX, e.targetTouches[0].clientY); }, { passive: false });
        leftZone.addEventListener('touchmove', (e) => { e.preventDefault(); isLeftTouching = true; updateLeftStickTarget(e.targetTouches[0].clientX, e.targetTouches[0].clientY); }, { passive: false });
        leftZone.addEventListener('touchend', (e) => { e.preventDefault(); isLeftTouching = false; joyLeftDx = 0; joyLeftDy = 0; leftStick.style.transform = `translate(-50%, -50%)`; }, { passive: false });

        function updateWind() {
            let speed = parseFloat(document.getElementById('windSpeed').value);
            let dir = document.getElementById('windDir').value;
            if (dir === 'NONE') {
                windStatusText.innerText = `【無風模式】環境平穩`;
                targetWind.x = 0; targetWind.z = 0;
            } else if (dir === 'RANDOM') {
                windStatusText.innerText = `【動態陣風模式】環境：強風、弱風、無風自然交替中`;
            } else {
                windStatusText.innerText = `【恆定風向模式】環境風速: ${(speed * 200).toFixed(0)} 節`;
                let wx = 0, wz = 0;
                if (dir.includes('E')) wx = 1; if (dir.includes('W')) wx = -1;
                if (dir.includes('S')) wz = 1; if (dir.includes('N')) wz = -1;
                if (wx !== 0 && wz !== 0) { wx *= 0.8; wz *= 0.8; }
                targetWind.x = wx * speed; targetWind.z = wz * speed;
            }
        }

        function triggerRandomWind() {
            if (document.getElementById('windDir').value !== 'RANDOM') return;
            const baseSpeed = parseFloat(document.getElementById('windSpeed').value);
            const dirs = ['E', 'W', 'S', 'N', 'NE', 'NW', 'SE', 'SW'];
            let nextDuration = 1500 + Math.random() * 3500; 
            let stateRoll = Math.random();
            if (stateRoll < 0.3) { targetWind.x = 0; targetWind.z = 0; } else {
                let dirStr = dirs[Math.floor(Math.random() * dirs.length)];
                let wx = 0, wz = 0;
                if (dirStr.includes('E')) wx = 1; if (dirStr.includes('W')) wx = -1;
                if (dirStr.includes('S')) wz = 1; if (dirStr.includes('N')) wz = -1;
                if (wx !== 0 && wz !== 0) { wx *= 0.8; wz *= 0.8; }
                let multiplier = (stateRoll < 0.7) ? (0.2 + Math.random() * 0.4) : (0.8 + Math.random() * 0.8);
                targetWind.x = wx * baseSpeed * multiplier; targetWind.z = wz * baseSpeed * multiplier;
            }
            clearTimeout(windTimer); windTimer = setTimeout(triggerRandomWind, nextDuration);
        }

        document.getElementById('windSpeed').addEventListener('input', updateWind);
        document.getElementById('windDir').addEventListener('change', () => {
            clearTimeout(windTimer);
            if (document.getElementById('windDir').value === 'RANDOM') { updateWind(); triggerRandomWind(); } else { updateWind(); }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            droneLogic.x = 0; droneLogic.y = 3; droneLogic.z = 0; droneLogic.vx = 0; droneLogic.vz = 0; droneLogic.yaw = 0;
            updateWind();
        });

        // --- 2. Three.js 3D 引擎建置 ---
        const canvas = document.getElementById('simCanvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 40, 200); 

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(20, 80, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -50; dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50; dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.near = 0.5; dirLight.shadow.camera.far = 200;
        dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // ★ 指定場地大小為 70x35
        const groundGeo = new THREE.PlaneGeometry(70, 35); 
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x00A806 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        function createRunwayArea() {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0x51DD22 }); 
            const topGeo = new THREE.PlaneGeometry(36, 5.4);
            const topMesh = new THREE.Mesh(topGeo, mat); topMesh.rotation.x = -Math.PI / 2; topMesh.position.set(0, 0.015, -9.5); topMesh.receiveShadow = true;
            const botGeo = new THREE.PlaneGeometry(36, 5.4);
            const botMesh = new THREE.Mesh(botGeo, mat); botMesh.rotation.x = -Math.PI / 2; botMesh.position.set(0, 0.015, 0); botMesh.receiveShadow = true;
            const leftGeo = new THREE.PlaneGeometry(5.4, 4.1);
            const leftMesh = new THREE.Mesh(leftGeo, mat); leftMesh.rotation.x = -Math.PI / 2; leftMesh.position.set(-15.3, 0.015, -4.75); leftMesh.receiveShadow = true;
            const rightGeo = new THREE.PlaneGeometry(5.4, 4.1); 
            const rightMesh = new THREE.Mesh(rightGeo, mat); rightMesh.rotation.x = -Math.PI / 2; rightMesh.position.set(15.3, 0.015, -4.75); rightMesh.receiveShadow = true;
            group.add(topMesh, botMesh, leftMesh, rightMesh); return group;
        }
        scene.add(createRunwayArea());

        const grassShape = new THREE.Shape();
        grassShape.moveTo(-0.2, 0);
        grassShape.lineTo(-0.25, 0.4); 
        grassShape.lineTo(0, 0.15);    
        grassShape.lineTo(0.25, 0.4);  
        grassShape.lineTo(0.2, 0);     
        grassShape.lineTo(-0.2, 0);    
        const grassGeo = new THREE.ShapeGeometry(grassShape);
        
        const grassMat = new THREE.MeshBasicMaterial({ color: 0x2A7312, side: THREE.DoubleSide }); 
        
        // ★ 小草數量調降至 2000 以適應較小的場地範圍
        const grassCount = 100; 
        const grassInstanced = new THREE.InstancedMesh(grassGeo, grassMat, grassCount);
        grassInstanced.receiveShadow = true;
        grassInstanced.castShadow = true;

        const dummy = new THREE.Object3D();
        let placed = 0;
        while(placed < grassCount) {
            // ★ 將小草的生成範圍精準縮小在 70x35 的平面內 (略微縮減以防跑出場地外圍)
            let gx = (Math.random() - 0.5) * 68; // 對應長度 70
            let gz = (Math.random() - 0.5) * 33; // 對應寬度 35
            
            let inOuter = (gx > -19 && gx < 19 && gz > -13.2 && gz < 3.7);
            let inInner = (gx > -11.6 && gx < 11.6 && gz > -5.8 && gz < -1.7);
            let isTrack = inOuter && !inInner; 
            let distToH = Math.sqrt(gx*gx + gz*gz);
            let inHPad = distToH < 3.5;

            if(!isTrack && !inHPad) {
                dummy.position.set(gx, 0, gz);
                dummy.rotation.y = 0; 
                let scale = 0.5 + Math.random() * 1.0;
                dummy.scale.set(scale, scale, scale);
                dummy.updateMatrix();
                grassInstanced.setMatrixAt(placed, dummy.matrix);
                placed++;
            }
        }
        scene.add(grassInstanced);

        function createThickRect(minX, maxX, minZ, maxZ, thickness) {
            const group = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const widthX = maxX - minX; const lengthZ = maxZ - minZ;
            const cx = (maxX + minX) / 2; const cz = (maxZ + minZ) / 2;
            const hGeo = new THREE.PlaneGeometry(widthX + thickness, thickness);
            const top = new THREE.Mesh(hGeo, mat); top.rotation.x = -Math.PI / 2; top.position.set(cx, 0.03, minZ);
            const bottom = new THREE.Mesh(hGeo, mat); bottom.rotation.x = -Math.PI / 2; bottom.position.set(cx, 0.03, maxZ);
            const vGeo = new THREE.PlaneGeometry(thickness, lengthZ - thickness);
            const left = new THREE.Mesh(vGeo, mat); left.rotation.x = -Math.PI / 2; left.position.set(minX, 0.03, cz);
            const right = new THREE.Mesh(vGeo, mat); right.rotation.x = -Math.PI / 2; right.position.set(maxX, 0.03, cz);
            group.add(top, bottom, left, right); return group;
        }

        const LINE_THICKNESS = 0.2; 
        scene.add(createThickRect(-18, 18, -12.2, 2.7, LINE_THICKNESS));
        scene.add(createThickRect(-12.6, 12.6, -6.8, -2.7, LINE_THICKNESS));

        const hPadGroup = new THREE.Group();
        hPadGroup.position.set(0, 0.04, 0);
        const ringGeo = new THREE.RingGeometry(2.5, 2.7, 32);
        const redMat = new THREE.MeshBasicMaterial({ color: 0xff0505, side: THREE.DoubleSide });
        const ringMesh = new THREE.Mesh(ringGeo, redMat); ringMesh.rotation.x = -Math.PI / 2; hPadGroup.add(ringMesh);
        const hBarMat = new THREE.MeshBasicMaterial({ color: 0xff0505 });
        const vBarGeo = new THREE.PlaneGeometry(0.45, 2.1); const hBarGeo = new THREE.PlaneGeometry(1.5, 0.45);
        const leftBar = new THREE.Mesh(vBarGeo, hBarMat); leftBar.position.set(-0.75, 0.01, 0); leftBar.rotation.x = -Math.PI/2;
        const rightBar = new THREE.Mesh(vBarGeo, hBarMat); rightBar.position.set(0.75, 0.01, 0); rightBar.rotation.x = -Math.PI/2;
        const midBar = new THREE.Mesh(hBarGeo, hBarMat); midBar.position.set(0, 0.01, 0); midBar.rotation.x = -Math.PI/2;
        hPadGroup.add(leftBar, rightBar, midBar); scene.add(hPadGroup);

        function createTrafficCone() {
            const coneGroup = new THREE.Group();
            const matConeOrange = new THREE.MeshLambertMaterial({ color: 0xff5e13 });
            const matConeWhite = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const base = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.06, 1.0), matConeOrange); base.position.y = 0.03; base.castShadow = true; coneGroup.add(base);
            const heights = [0.4, 0.25, 0.25, 0.35]; const colors = [matConeOrange, matConeWhite, matConeOrange, matConeWhite];
            let currentY = 0.06; let currentRadius = 0.4;
            for(let i = 0; i < 4; i++) {
                let nextRadius = currentRadius - (0.35 * (heights[i] / 1.25));
                if(i === 3) nextRadius = 0.04; 
                const seg = new THREE.Mesh(new THREE.CylinderGeometry(nextRadius, currentRadius, heights[i], 16), colors[i]);
                seg.position.y = currentY + heights[i]/2; seg.castShadow = true; coneGroup.add(seg);
                currentY += heights[i]; currentRadius = nextRadius;
            } return coneGroup;
        }

        const conePositions = [ { x: -15.3, z: 0 }, { x: 15.3, z: 0 }, { x: -15.3, z: -9.5 }, { x: 15.3, z: -9.5 } ];
        conePositions.forEach(pos => { 
            const cone = createTrafficCone(); 
            cone.position.set(pos.x, 0, pos.z); 
            scene.add(cone); 
            colliders.push({ type: 'cylinder', x: pos.x, z: pos.z, r: 0.5, yMin: 0, yMax: 1.3 });
        });

        // --- 無人機高低球門 (包含實體碰撞) ---
        const goalData = [
            { x: -7, y: 3, z: -4.75, radius: 1.5, tube: 0.15, color: 0xf1c40f }, 
            { x: 0,  y: 5, z: -4.75, radius: 1.5, tube: 0.15, color: 0x9b59b6 }, 
            { x: 7,  y: 7, z: -4.75, radius: 1.5, tube: 0.15, color: 0xe67e22 }  
        ];

        goalData.forEach(g => {
            const ringGeo = new THREE.TorusGeometry(g.radius, g.tube, 16, 32);
            const ringMat = new THREE.MeshLambertMaterial({ color: g.color });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(g.x, g.y, g.z);
            ring.castShadow = true;
            scene.add(ring);
            
            colliders.push({ type: 'torus', x: g.x, y: g.y, z: g.z, r: g.radius, tube: g.tube });

            const poleHeight = g.y - g.radius;
            if(poleHeight > 0) {
                const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, poleHeight, 8);
                const poleMat = new THREE.MeshLambertMaterial({ color: 0x7f8c8d });
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.position.set(g.x, poleHeight / 2, g.z);
                pole.castShadow = true;
                scene.add(pole);
                
                colliders.push({ type: 'cylinder', x: g.x, z: g.z, r: 0.15, yMin: 0, yMax: poleHeight });
            }
        });

        // --- 3. 建立無人機模型 ---
        const droneGroup = new THREE.Group(); const droneTiltGroup = new THREE.Group(); droneGroup.add(droneTiltGroup); scene.add(droneGroup);
        const matBodyWhite = new THREE.MeshLambertMaterial({ color: 0xecf0f1 }); const matBodyDark = new THREE.MeshLambertMaterial({ color: 0x2d3436 }); 
        const matMotor = new THREE.MeshStandardMaterial({ color: 0xbdc3c7, metalness: 0.8, roughness: 0.2 }); const matProp = new THREE.MeshLambertMaterial({ color: 0x111111, transparent: true, opacity: 0.5, side: THREE.DoubleSide }); 
        const matLens = new THREE.MeshStandardMaterial({ color: 0x0984e3, metalness: 0.9, roughness: 0.1 }); const matRedLED = new THREE.MeshBasicMaterial({ color: 0xff4757 }); 
        const matGreenLED = new THREE.MeshBasicMaterial({ color: 0x2ecc71 }); const matArmFront = new THREE.MeshLambertMaterial({ color: 0xff4757 }); 

        const body = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.15, 0.6), matBodyWhite); body.castShadow = true; droneTiltGroup.add(body);
        const battery = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.08, 0.35), matBodyDark); battery.position.set(0, 0.11, 0.05); battery.castShadow = true; droneTiltGroup.add(battery);
        const gimbal = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.15), matBodyDark); gimbal.position.set(0, -0.05, -0.32); gimbal.castShadow = true; droneTiltGroup.add(gimbal);
        const lens = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), matLens); lens.position.set(0, 0, -0.08); gimbal.add(lens);

        const armGeo = new THREE.CylinderGeometry(0.03, 0.04, 0.65, 16); const motorGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.12, 16); const propGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.01, 24); 
        const spinningProps = [];
        const propPositions = [ { x: 0.45, z: -0.45, led: matRedLED, angle: -Math.PI / 4, isFront: true }, { x: -0.45, z: -0.45, led: matRedLED, angle: Math.PI / 4, isFront: true }, { x: 0.45, z: 0.45, led: matGreenLED, angle: Math.PI / 4, isFront: false }, { x: -0.45, z: 0.45, led: matGreenLED, angle: -Math.PI / 4, isFront: false } ];

        propPositions.forEach(pos => {
            const currentArmMat = pos.isFront ? matArmFront : matBodyDark;
            const arm = new THREE.Mesh(armGeo, currentArmMat); arm.rotation.z = Math.PI / 2; arm.rotation.y = pos.angle; arm.position.set(pos.x / 2, 0, pos.z / 2); arm.castShadow = true; droneTiltGroup.add(arm);
            const motor = new THREE.Mesh(motorGeo, matMotor); motor.position.set(pos.x, 0.06, pos.z); motor.castShadow = true; droneTiltGroup.add(motor);
            const prop = new THREE.Mesh(propGeo, matProp); prop.position.set(pos.x, 0.13, pos.z); prop.castShadow = true; droneTiltGroup.add(prop); spinningProps.push(prop); 
            const led = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), pos.led); led.position.set(pos.x, 0.10, pos.z); droneTiltGroup.add(led);
        });

        const legGeo = new THREE.CylinderGeometry(0.02, 0.01, 0.2, 8); const legPositions = [ { x: 0.12, z: -0.15 }, { x: -0.12, z: -0.15 }, { x: 0.12, z: 0.15 }, { x: -0.12, z: 0.15 } ];
        legPositions.forEach(pos => { const leg = new THREE.Mesh(legGeo, matBodyDark); leg.position.set(pos.x, -0.15, pos.z); leg.castShadow = true; droneTiltGroup.add(leg); });
        const topArrow = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.25, 3), matRedLED); topArrow.rotation.x = -Math.PI / 2; topArrow.position.set(0, 0.16, -0.12); topArrow.castShadow = true; droneTiltGroup.add(topArrow);

        windArrow3D = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 5.0, 10), 3, 0x3498db, 1.5, 0.8); scene.add(windArrow3D);

        let droneLogic = { x: 0, y: 3, z: 0, vx: 0, vz: 0, yaw: 0 }; 
        droneGroup.position.y = droneLogic.y; 

        let dynamicCameraY = 25; 
        function updateDynamicHeight() {
            const baseHeight = 25; 
            if (camera.aspect < 1.6) { dynamicCameraY = baseHeight * (1.6 / camera.aspect); } else { dynamicCameraY = baseHeight; }
        }

        function resizeCanvasToDisplaySize() {
            const container = document.getElementById('gameArea');
            const width = container.clientWidth; const height = container.clientHeight;
            if (canvas.width !== width || canvas.height !== height) {
                renderer.setSize(width, height, false); camera.aspect = width / height; camera.updateProjectionMatrix(); updateDynamicHeight();
            }
        }

        // --- 4. 物理運算與動畫渲染迴圈 ---
        function animate() {
            requestAnimationFrame(animate);
            resizeCanvasToDisplaySize();

            if (typeof spinningProps !== 'undefined') { spinningProps.forEach(prop => { prop.rotation.y += 0.8; }); }

            if (keys['a']) droneLogic.yaw += 0.025; 
            if (keys['d']) droneLogic.yaw -= 0.025;
            
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : []; const gp = gamepads[0]; 
            if (gp) {
                const deadzone = 0.1; 
                let leftX = Math.abs(gp.axes[0]) > deadzone ? gp.axes[0] : 0; let leftY = Math.abs(gp.axes[1]) > deadzone ? gp.axes[1] : 0;
                let rightX = Math.abs(gp.axes[2]) > deadzone ? gp.axes[2] : 0; let rightY = Math.abs(gp.axes[3]) > deadzone ? gp.axes[3] : 0;

                if (!isLeftTouching) {
                    if (leftX !== 0 || leftY !== 0) {
                        joyLeftDx = leftX * 60; joyLeftDy = leftY * 60;
                        if (leftZone.style.display !== 'none') {
                            const r = (leftZone.clientWidth / 2) - (leftStick.offsetWidth / 2);
                            leftStick.style.transform = `translate(calc(-50% + ${leftX * r}px), calc(-50% + ${leftY * r}px))`;
                        }
                    } else { joyLeftDx = 0; joyLeftDy = 0; if (leftZone.style.display !== 'none') leftStick.style.transform = `translate(-50%, -50%)`; }
                }

                if (!isTouching) {
                    if (rightX !== 0 || rightY !== 0) {
                        joyDx = rightX * 80; joyDy = rightY * 80;
                        if (zone.style.display !== 'none') {
                            const r = (zone.clientWidth / 2) - (stick.offsetWidth / 2);
                            stick.style.transform = `translate(calc(-50% + ${rightX * r}px), calc(-50% + ${rightY * r}px))`;
                        }
                    } else { joyDx = 0; joyDy = 0; if (zone.style.display !== 'none') stick.style.transform = `translate(-50%, -50%)`; }
                }
            }

            if (joyLeftDx !== 0) { droneLogic.yaw -= (joyLeftDx / 60) * 0.02; }
            if (joyLeftDy !== 0) { droneLogic.y -= (joyLeftDy / 60) * 0.08; }

            if (droneLogic.y < 0.2) droneLogic.y = 0.2; 
            if (droneLogic.y > 12) droneLogic.y = 10; 

            currentWind.x += (targetWind.x - currentWind.x) * 0.02;
            currentWind.z += (targetWind.z - currentWind.z) * 0.02;

            droneGroup.rotation.y = droneLogic.yaw;

            let maxTilt = 0.2; let targetPitch = (joyDy / 60) * maxTilt; let targetRoll = (joyDx / 60) * maxTilt;
            droneTiltGroup.rotation.x += (targetPitch - droneTiltGroup.rotation.x) * 0.12; droneTiltGroup.rotation.z += (targetRoll - droneTiltGroup.rotation.z) * 0.12;

            let accel = 0.004; let thrustX = (joyDx / 60) * accel; let thrustZ = (joyDy / 60) * accel;
            let worldAccX = thrustX * Math.cos(droneLogic.yaw) + thrustZ * Math.sin(droneLogic.yaw);
            let worldAccZ = -thrustX * Math.sin(droneLogic.yaw) + thrustZ * Math.cos(droneLogic.yaw);

            let windForceX = currentWind.x * 0.05; let windForceZ = currentWind.z * 0.05;
            droneLogic.vx += worldAccX + windForceX; droneLogic.vz += worldAccZ + windForceZ;
            let drag = 0.95; droneLogic.vx *= drag; droneLogic.vz *= drag;
            
            // 運算下一偵的預期位置
            let nextX = droneLogic.x + droneLogic.vx;
            let nextZ = droneLogic.z + droneLogic.vz;
            
            // --- 實體碰撞偵測系統 ---
            const droneRadius = 0.4; 
            let collisionHit = false;

            for (let c of colliders) {
                if (c.type === 'cylinder') { 
                    let dx = nextX - c.x;
                    let dz = nextZ - c.z;
                    let dist2 = dx*dx + dz*dz;
                    let minDist = droneRadius + c.r;
                    if (dist2 < minDist*minDist && droneLogic.y >= c.yMin && droneLogic.y - 0.2 <= c.yMax) {
                        collisionHit = true; break;
                    }
                } else if (c.type === 'torus') { 
                    let dZ = Math.abs(nextZ - c.z);
                    let dx = nextX - c.x;
                    let dy = droneLogic.y - c.y;
                    let dXY = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dZ < droneRadius + c.tube) {
                        let distToRingCenter = Math.abs(dXY - c.r);
                        if (distToRingCenter < droneRadius + c.tube) {
                            collisionHit = true; break;
                        }
                    }
                }
            }

            if (collisionHit) {
                droneLogic.vx *= -0.8;
                droneLogic.vz *= -0.8;
                
                document.getElementById('crashAlert').style.display = 'block';
                if(window.crashTimer) clearTimeout(window.crashTimer);
                window.crashTimer = setTimeout(() => { document.getElementById('crashAlert').style.display = 'none'; }, 600);
            } else {
                droneLogic.x = nextX;
                droneLogic.z = nextZ;
            }
            
            // ★ 修改無人機的空氣牆界線，使其符合 70x35 的場地 (預留一點邊界)
            const mapBoundX = 34.5;
            const mapBoundZ = 17.0;
            if(droneLogic.x > mapBoundX) { droneLogic.x = mapBoundX; droneLogic.vx = 0; }
            if(droneLogic.x < -mapBoundX) { droneLogic.x = -mapBoundX; droneLogic.vx = 0; }
            if(droneLogic.z > mapBoundZ) { droneLogic.z = mapBoundZ; droneLogic.vz = 0; }
            if(droneLogic.z < -mapBoundZ) { droneLogic.z = -mapBoundZ; droneLogic.vz = 0; }

            droneGroup.position.x = droneLogic.x; droneGroup.position.y = droneLogic.y; droneGroup.position.z = droneLogic.z;

            let showArrow = document.getElementById('showArrowBtn').checked;
            if (windArrow3D) {
                let windSpeedMag = Math.sqrt(currentWind.x**2 + currentWind.z**2);
                if (windSpeedMag > 0.005 && showArrow) { 
                    windArrow3D.visible = true;
                    let wVector = new THREE.Vector3(currentWind.x, 0, currentWind.z).normalize();
                    let arrowLen = 3 + windSpeedMag * 30; 
                    windArrow3D.setDirection(wVector); windArrow3D.setLength(arrowLen, 0.5, 0.4);
                    let offsetDistance = 1.2; 
                    let tipPos = droneGroup.position.clone().sub(wVector.multiplyScalar(offsetDistance));
                    tipPos.y = droneGroup.position.y; 
                    let originPos = tipPos.clone().sub(wVector.multiplyScalar(arrowLen));
                    windArrow3D.position.copy(originPos);
                } else { windArrow3D.visible = false; }
            }

            // --- 套用按鈕切換的兩種視角 ---
            if (currentCamView === 1) {
                camera.position.set(0, dynamicCameraY / 1.3, 5);
                camera.lookAt(0, -35, -20);

            } else {
                camera.position.set(0, dynamicCameraY / 2, 14);
                camera.lookAt(0, 1, -5);
            }

            renderer.render(scene, camera);
        }

        if (document.getElementById('windDir').value === 'RANDOM') { triggerRandomWind(); }
        
        updateDynamicHeight(); updateWind(); animate();
    </script>
</body>
</html>
